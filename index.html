<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoRu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>WhoRu</h1>

    <div class="card">
      <input id="name" placeholder="Введите имя">
      <button onclick="join()">Войти</button>
    </div>

    <div id="game" style="display:none;">
      <div class="card">
        <h3>Игроки</h3>
        <ul id="players"></ul>
        <h3 id="role"></h3>
      </div>

      <div id="leaderPanel" class="card" style="display:none;">
        <h3>Панель ведущего</h3>
        <input id="correctAnswer" placeholder="Правильный ответ">
        <input type="file" id="imageUpload" accept="image/*">
        <button onclick="startRound()">Начать раунд</button>
      </div>

      <div class="card">
        <h3>Фото</h3>
        <img id="photo" style="display:none;" alt="Фото персонажа">
        <p id="hiddenText">Фото скрыто до правильного ответа</p>
      </div>

      <div class="card">
        <h3>Вопрос</h3>
        <input id="question" placeholder="Введите вопрос">
        <button onclick="sendQuestion()">Задать</button>
      </div>

      <div class="card">
        <h3>Ответ ведущего</h3>
        <button onclick="sendAnswer('Да')">Да</button>
        <button onclick="sendAnswer('Нет')">Нет</button>
      </div>

      <div class="card">
        <h3>Угадать</h3>
        <input id="guess" placeholder="Кто это?">
        <button onclick="sendGuess()">Угадать</button>
      </div>

      <div class="card">
        <h3>Лог игры</h3>
        <ul id="log"></ul>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
