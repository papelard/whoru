<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoRu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div id="joinScreen">
      <img src="/mystery.jpg" class="hero-img" alt="WhoRu">
      <h1>WhoRu</h1>

      <form id="joinForm">
        <input id="name" placeholder="Имя">
        <button type="submit">Войти</button>
      </form>
    </div>

    <div id="game" style="display:none;">
      <h3 id="role"></h3>

      <ul id="players"></ul>

      <div id="leaderPanel" style="display:none;">
        <input id="correctAnswer" placeholder="Ответ">
        <input type="file" id="imageUpload">
        <button onclick="startRound()">Старт</button>
      </div>

      <img id="photo" style="display:none; max-width:200px; width:100%; border-radius:12px; margin-top:10px;">
      <p id="hiddenText">Фото скрыто</p>

      <input id="question" placeholder="Вопрос">
      <button onclick="sendQuestion()">Спросить</button>

      <div class="answer-buttons">
        <button onclick="sendAnswer('Да')">Да</button>
        <button onclick="sendAnswer('Нет')">Нет</button>
      </div>

      <input id="guess" placeholder="Кто это?">
      <button onclick="sendGuess()">Угадать</button>

      <ul id="log"></ul>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
