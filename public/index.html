<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhoRu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06101f;
      --bg2: #0d1d35;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.1);
      --accent: #3b82f6;
      --accent2: #22c55e;
      --accent3: #f59e0b;
      --danger: #ef4444;
      --text: #e8f0fe;
      --muted: rgba(255,255,255,0.45);
      --radius: 18px;
      --radius-sm: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59,130,246,0.18) 0%, transparent 70%);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }
    h2 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
    .hidden { display: none !important; }
    input, select, button { border: none; border-radius: var(--radius-sm); font-size: 15px; padding: 12px 14px; font-family: 'Nunito', sans-serif; font-weight: 600; }
    input, select { width: 100%; background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.12); outline: none; transition: border-color .2s; }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: #0d1d35; }
    button { background: var(--accent); color: white; cursor: pointer; font-weight: 700; transition: transform .12s, opacity .12s; user-select: none; }
    button:active { transform: scale(0.96); }
    button:hover { opacity: 0.88; }
    button.green { background: var(--accent2); }
    button.red { background: var(--danger); }
    button.gray { background: rgba(255,255,255,0.12); color: var(--text); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 140px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
    .tab-btn { flex: 1; background: rgba(255,255,255,0.08); }
    .tab-btn.active { background: var(--accent); }
    .room-code-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .room-code { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 4px; color: #60a5fa; }
    .invite-btn { font-size: 13px; padding: 8px 14px; background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); border-radius: 10px; cursor: pointer; transition: background .2s; flex: unset; }
    .invite-btn:hover { background: rgba(59,130,246,0.35); }
    .invite-copied { font-size: 13px; color: var(--accent2); opacity: 0; transition: opacity .3s; }
    .invite-copied.show { opacity: 1; }
    .top-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 800px) { .top-grid { grid-template-columns: 1.3fr 0.7fr; } }
    .timer-wrap { margin: 12px 0 4px; }
    .timer-bar-bg { background: rgba(255,255,255,0.1); border-radius: 99px; height: 8px; overflow: hidden; }
    .timer-bar { height: 100%; border-radius: 99px; background: var(--accent2); transition: width 0.9s linear, background 0.5s; width: 100%; }
    .timer-bar.warn { background: var(--accent3); }
    .timer-bar.danger { background: var(--danger); }
    .timer-text { font-size: 13px; color: var(--muted); margin-top: 5px; text-align: right; }
    .timer-text span { color: var(--text); font-weight: 700; }
    .q-counter { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; padding: 5px 12px; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .q-counter strong { color: var(--text); }
    .action-row { display: flex; gap: 10px; margin-top: 12px; }
    .action-row button { flex: 1; }
    #dontKnowBtn { background: rgba(255,255,255,0.12); }
    #turnBox { font-weight: 700; background: rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 12px; font-size: 15px; }
    #hostAnswerBox { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.25); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 10px; font-weight: 700; }
    .char-card { text-align: center; }
    #personImage { width: 100%; max-width: 320px; display: none; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); margin: 0 auto 12px; transition: opacity .4s; }
    #personImage.reveal { animation: revealPop .5s cubic-bezier(.2,1.6,.5,1) forwards; }
    @keyframes revealPop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    #imageHiddenText { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
    .players-list { list-style: none; }
    .players-list li { background: rgba(255,255,255,0.05); border: 1px solid transparent; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; font-size: 14px; font-weight: 600; transition: border-color .3s; }
    .players-list li.turn { border-color: var(--accent2); background: rgba(34,197,94,0.08); }
    .players-list li.host { border-color: var(--accent3); background: rgba(245,158,11,0.08); }
    .msg-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px 12px; margin-top: 8px; font-size: 13px; word-break: break-word; animation: fadeSlide .25s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    #winOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 16px; backdrop-filter: blur(8px); animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .win-card { background: linear-gradient(135deg, #0d1d35, #162a4a); border: 1px solid rgba(59,130,246,0.3); border-radius: 24px; padding: 32px 28px; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 24px 60px rgba(0,0,0,0.6); animation: popIn .4s cubic-bezier(.2,1.6,.5,1); }
    @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .win-card img { width: 150px; height: 150px; object-fit: cover; border-radius: 16px; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .win-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 2px; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .win-name { font-size: 22px; font-weight: 800; margin: 6px 0 4px; }
    .win-answer { color: var(--muted); font-size: 15px; }
    .error-msg { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; margin-top: 10px; color: #fca5a5; }
    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    @media (max-width: 500px) { .logo { font-size: 38px; } .action-row { flex-direction: column; } .row > * { min-width: 100%; } }
  </style>
</head>
