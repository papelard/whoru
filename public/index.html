<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>WhoRu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>WhoRu</h1>

<input id="name" placeholder="Имя">
<button onclick="join()">Войти</button>

<div id="game" style="display:none;">

  <h3 id="role"></h3>

  <ul id="players"></ul>

  <div id="leaderPanel" style="display:none;">
    <input id="correctAnswer" placeholder="Ответ">
    <input type="file" id="imageUpload">
    <button onclick="startRound()">Старт</button>
  </div>

  <img id="photo" style="display:none; max-width:200px;">
  <p id="hiddenText">Фото скрыто</p>

  <input id="question" placeholder="Вопрос">
  <button onclick="sendQuestion()">Спросить</button>

  <button onclick="sendAnswer('Да')">Да</button>
  <button onclick="sendAnswer('Нет')">Нет</button>

  <input id="guess" placeholder="Кто это?">
  <button onclick="sendGuess()">Угадать</button>

  <ul id="log"></ul>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
