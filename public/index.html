<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoRu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <div class="card">

      <div id="joinScreen" class="screen">
        <div class="logo">WhoRu</div>
        <p class="subtitle">Комнаты 1–10 с паролем</p>

        <form id="joinForm" class="stack">
          <input id="name" placeholder="Имя" autocomplete="off">
          <input id="roomCode" placeholder="Комната (1-10)" autocomplete="off">
          <input id="roomPassword" placeholder="Пароль комнаты" autocomplete="off">
          <button type="submit">Войти</button>
        </form>

        <p id="joinError" class="error-text"></p>
      </div>

      <div id="game" class="screen" style="display:none;">
        <div class="topbar">
          <h2 id="role">Игра</h2>
          <p id="roomLabel" class="muted"></p>
        </div>

        <ul id="players" class="players"></ul>

        <div class="panel stack">
          <h3 class="section-title">🏆 Счёт</h3>
          <ul id="scoreboard" class="scoreboard"></ul>
        </div>

        <div id="leaderPanel" class="panel stack" style="display:none;">
          <h3 class="section-title">Панель ведущего</h3>

          <select id="packSelect"></select>
          <button type="button" onclick="randomFromPack()">🎲 Рандом из пака</button>

          <input id="correctAnswer" placeholder="Правильный ответ">
          <input type="file" id="imageUpload" accept="image/*">
          <button onclick="startRound()">Старт раунда</button>
        </div>

        <div class="photo-box">
          <img id="photo" style="display:none;" alt="Фото">
          <p id="hiddenText" class="muted">Фото скрыто</p>
        </div>

        <div class="panel stack">
          <h3 class="section-title">Вопрос</h3>
          <input id="question" placeholder="Напиши вопрос">
          <button onclick="sendQuestion()">Спросить</button>
        </div>

        <div id="answerButtons" class="panel stack">
          <h3 class="section-title">Ответ</h3>
          <div class="row">
            <button class="half" onclick="sendAnswer('Да')">Да</button>
            <button class="half" onclick="sendAnswer('Нет')">Нет</button>
          </div>
        </div>

        <div id="guessBlock" class="panel stack">
          <h3 class="section-title">Угадать</h3>
          <input id="guess" placeholder="Твой ответ">
          <button onclick="sendGuess()">Угадать</button>
        </div>

        <div class="panel stack">
          <h3 class="section-title">Чат</h3>
          <ul id="log" class="log"></ul>
        </div>
      </div>

    </div>
  </div>

  <div class="signature">Made by Papeland</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
