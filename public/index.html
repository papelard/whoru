<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhoRu</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.wrap {
  max-width:800px;
  margin:auto;
  padding:20px;
}

input, button, select {
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button {
  background:#3b82f6;
  color:white;
}

#game { display:none; }

.player {
  background:#1e293b;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.turn {
  border:2px solid lime;
}

.host {
  border:2px solid orange;
}

img {
  width:100%;
  max-width:300px;
  border-radius:15px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>WhoRu</h1>

<div id="login">
<input id="name" placeholder="ник">
<button onclick="join()">Войти</button>
</div>

<div id="game">

<select id="category">
<option value="">Все</option>
<option value="football">Футбол</option>
<option value="music">Музыка</option>
<option value="actors">Актёры</option>
</select>

<button onclick="start()">Старт</button>

<div>
<img id="img">
</div>

<input id="answer" placeholder="кто это?">
<button onclick="sendAnswer()">Ответ</button>

<div id="players"></div>

<div id="log"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myId;
let isHost = false;

function join() {
  socket.emit("joinGame", document.getElementById("name").value);
}

function start() {
  socket.emit("startRound", document.getElementById("category").value);
}

function sendAnswer() {
  socket.emit("answer", document.getElementById("answer").value);
}

socket.on("joined", (data) => {
  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
  isHost = data.isHost;
});

socket.on("players", (list) => {
  const el = document.getElementById("players");
  el.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "player";
    div.textContent = p.name + " (" + p.score + ")";
    el.appendChild(div);
  });
});

socket.on("round", (data) => {
  document.getElementById("img").src = data.image;
});

socket.on("turn", (id) => {
  log("Ход другого игрока");
});

socket.on("win", (data) => {
  log("Победил " + data.name + " | " + data.answer);
});

socket.on("answer", (name) => {
  log("Ответ: " + name);
});

function log(text) {
  const el = document.getElementById("log");
  el.innerHTML = "<div>" + text + "</div>" + el.innerHTML;
}
</script>

</body>
</html>
