<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhoRu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #081633;
      color: white;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 44px;
    }

    h2 {
      margin-top: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    input, select, button {
      border: none;
      border-radius: 12px;
      font-size: 16px;
      padding: 12px;
    }

    input, select {
      width: 100%;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
      min-width: 160px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 960px) {
      .top-grid {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

    #personImage {
      width: 100%;
      max-width: 360px;
      display: none;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      margin: 0 auto;
    }

    .players-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .players-list li {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .turn {
      border: 2px solid #22c55e;
    }

    .host {
      border: 2px solid #f59e0b;
    }

    .msg {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 8px;
      word-break: break-word;
    }

    .center {
      text-align: center;
    }

    #turnBox {
      font-weight: bold;
    }

    #hostAnswerBox {
      background: rgba(245, 158, 11, 0.15);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab-btn {
      flex: 1;
    }

    .room-code {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WhoRu</h1>

    <div id="lobbyCard" class="card">
      <div class="tabs">
        <button id="showCreateBtn" class="tab-btn">Создать комнату</button>
        <button id="showJoinBtn" class="tab-btn">Войти в комнату</button>
      </div>

      <div id="createBox">
        <div class="row">
          <input id="createNicknameInput" type="text" placeholder="Ваш ник" />
          <input id="createPasswordInput" type="text" placeholder="Пароль комнаты" />
          <button id="createRoomBtn">Создать</button>
        </div>
      </div>

      <div id="joinBox" class="hidden">
        <div class="row">
          <input id="joinNicknameInput" type="text" placeholder="Ваш ник" />
          <input id="joinRoomCodeInput" type="text" placeholder="Код комнаты" />
          <input id="joinPasswordInput" type="text" placeholder="Пароль комнаты" />
          <button id="joinRoomBtn">Войти</button>
        </div>
      </div>

      <div id="joinError" class="msg hidden"></div>
    </div>

    <div id="gameUI" class="hidden">
      <div class="card">
        <div>Комната:</div>
        <div id="roomCodeBox" class="room-code">—</div>
      </div>

      <div class="top-grid">
        <div>
          <div class="card">
            <h2>Управление</h2>

            <div id="hostControls" class="hidden">
              <div class="row">
                <select id="categorySelect">
                  <option value="">Все категории</option>
                  <option value="football">Футбол</option>
                  <option value="music">Музыка</option>
                  <option value="actors">Актёры</option>
                </select>
                <button id="startRoundBtn">Старт</button>
              </div>
            </div>

            <div class="row" style="margin-top: 12px;">
              <button id="yesBtn">Да</button>
              <button id="noBtn">Нет</button>
            </div>

            <div class="row" style="margin-top: 12px;">
              <input id="answerInput" type="text" placeholder="Кто это?" />
              <button id="answerBtn">Ответ</button>
            </div>

            <div id="turnBox" class="msg">Ход: —</div>
            <div id="hostAnswerBox" class="msg hidden"></div>
          </div>

          <div class="card center">
            <h2>Персонаж</h2>
            <img id="personImage" alt="character" />
            <div id="imageHiddenText" class="msg">Игрокам картинка скрыта</div>
            <div id="categoryBox" class="msg">Категория: —</div>
          </div>
        </div>

        <div>
          <div class="card">
            <h2>Игроки</h2>
            <ul id="playersList" class="players-list"></ul>
          </div>

          <div class="card">
            <h2>События</h2>
            <div id="messages"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const lobbyCard = document.getElementById("lobbyCard");
    const gameUI = document.getElementById("gameUI");

    const showCreateBtn = document.getElementById("showCreateBtn");
    const showJoinBtn = document.getElementById("showJoinBtn");
    const createBox = document.getElementById("createBox");
    const joinBox = document.getElementById("joinBox");

    const createNicknameInput = document.getElementById("createNicknameInput");
    const createPasswordInput = document.getElementById("createPasswordInput");
    const createRoomBtn = document.getElementById("createRoomBtn");

    const joinNicknameInput = document.getElementById("joinNicknameInput");
    const joinRoomCodeInput = document.getElementById("joinRoomCodeInput");
    const joinPasswordInput = document.getElementById("joinPasswordInput");
    const joinRoomBtn = document.getElementById("joinRoomBtn");

    const joinError = document.getElementById("joinError");

    const roomCodeBox = document.getElementById("roomCodeBox");
    const hostControls = document.getElementById("hostControls");
    const categorySelect = document.getElementById("categorySelect");
    const startRoundBtn = document.getElementById("startRoundBtn");

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const answerInput = document.getElementById("answerInput");
    const answerBtn = document.getElementById("answerBtn");

    const personImage = document.getElementById("personImage");
    const imageHiddenText = document.getElementById("imageHiddenText");
    const categoryBox = document.getElementById("categoryBox");
    const turnBox = document.getElementById("turnBox");
    const hostAnswerBox = document.getElementById("hostAnswerBox");
    const playersList = document.getElementById("playersList");
    const messages = document.getElementById("messages");

    let isHost = false;
    let roomCode = "";

    function addMessage(text) {
      const div = document.createElement("div");
      div.className = "msg";
      div.textContent = text;
      messages.prepend(div);

      while (messages.children.length > 8) {
        messages.removeChild(messages.lastChild);
      }
    }

    function showJoinError(text) {
      joinError.textContent = text;
      joinError.classList.remove("hidden");
    }

    function clearJoinError() {
      joinError.textContent = "";
      joinError.classList.add("hidden");
    }

    function showCreateTab() {
      createBox.classList.remove("hidden");
      joinBox.classList.add("hidden");
      clearJoinError();
    }

    function showJoinTab() {
      createBox.classList.add("hidden");
      joinBox.classList.remove("hidden");
      clearJoinError();
    }

    showCreateBtn.addEventListener("click", showCreateTab);
    showJoinBtn.addEventListener("click", showJoinTab);

    createRoomBtn.addEventListener("click", () => {
      clearJoinError();
      socket.emit("createRoom", {
        nickname: createNicknameInput.value.trim(),
        password: createPasswordInput.value.trim()
      });
    });

    joinRoomBtn.addEventListener("click", () => {
      clearJoinError();
      socket.emit("joinRoom", {
        nickname: joinNicknameInput.value.trim(),
        roomCode: joinRoomCodeInput.value.trim(),
        password: joinPasswordInput.value.trim()
      });
    });

    createNicknameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") createRoomBtn.click();
    });

    createPasswordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") createRoomBtn.click();
    });

    joinNicknameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") joinRoomBtn.click();
    });

    joinRoomCodeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") joinRoomBtn.click();
    });

    joinPasswordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") joinRoomBtn.click();
    });

    startRoundBtn.addEventListener("click", () => {
      socket.emit("startRound", categorySelect.value);
    });

    yesBtn.addEventListener("click", () => {
      socket.emit("questionResult", "yes");
    });

    noBtn.addEventListener("click", () => {
      socket.emit("questionResult", "no");
    });

    answerBtn.addEventListener("click", () => {
      const answer = answerInput.value.trim();
      if (!answer) return;
      socket.emit("submitAnswer", answer);
      answerInput.value = "";
    });

    answerInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        answerBtn.click();
      }
    });

    socket.on("joined", (data) => {
      isHost = data.isHost;
      roomCode = data.roomCode || "";

      lobbyCard.classList.add("hidden");
      gameUI.classList.remove("hidden");
      roomCodeBox.textContent = roomCode || "—";

      if (isHost) {
        hostControls.classList.remove("hidden");
        imageHiddenText.classList.add("hidden");
        addMessage("Ты ведущий");
      } else {
        hostControls.classList.add("hidden");
        imageHiddenText.classList.remove("hidden");
        addMessage("Ты игрок");
      }
    });

    socket.on("becameHost", () => {
      isHost = true;
      hostControls.classList.remove("hidden");
      imageHiddenText.classList.add("hidden");
      addMessage("Теперь ты ведущий");
    });

    socket.on("joinError", (text) => {
      showJoinError(text);
    });

    socket.on("playersUpdated", (players) => {
      playersList.innerHTML = "";

      players.forEach((player) => {
        const li = document.createElement("li");

        if (player.isTurn) li.classList.add("turn");
        if (player.isHost) li.classList.add("host");

        li.textContent =
          `${player.name} — ${player.score} очк.` +
          (player.isHost ? " 👑" : "") +
          (player.isTurn ? " 🎯 ход" : "");

        playersList.appendChild(li);
      });
    });

    socket.on("roundStarted", (data) => {
      categoryBox.textContent = "Категория: " + (data.category || "—");
      turnBox.textContent = "Ход: " + (data.turnPlayerName || "—");
      addMessage("Раунд начался");

      if (!isHost) {
        personImage.src = "";
        personImage.style.display = "none";
        imageHiddenText.classList.remove("hidden");
        hostAnswerBox.classList.add("hidden");
      }
    });

    socket.on("hostRoundData", (data) => {
      if (!isHost) return;

      if (data.image) {
        personImage.src = data.image;
        personImage.style.display = "block";
      } else {
        personImage.style.display = "none";
      }

      imageHiddenText.classList.add("hidden");
      hostAnswerBox.classList.remove("hidden");
      hostAnswerBox.textContent =
        `Ответ для ведущего: ${data.name} (${data.category})`;
    });

    socket.on("playerRoundData", () => {
      if (isHost) return;
      personImage.src = "";
      personImage.style.display = "none";
      imageHiddenText.classList.remove("hidden");
      hostAnswerBox.classList.add("hidden");
    });

    socket.on("turnChanged", (data) => {
      turnBox.textContent = "Ход: " + (data.turnPlayerName || "—");
      addMessage("Ход: " + (data.turnPlayerName || "—"));
    });

    socket.on("roundWinner", (data) => {
      addMessage(`Победитель: ${data.winnerName}. Ответ: ${data.correctName}`);
    });

    socket.on("answerWrong", () => {
      addMessage("Неправильно");
    });

    socket.on("systemMessage", (text) => {
      addMessage(text);
    });
  </script>
</body>
</html>
