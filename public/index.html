<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Кто это?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Игра "Кто это?"</h1>

  <input id="name" placeholder="Имя">
  <button onclick="join()">Войти</button>

  <hr>

  <div id="game" style="display:none">
    <h3>Игроки:</h3>
    <ul id="players"></ul>

    <h3 id="role"></h3>

    <div id="leaderPanel" style="display:none; margin-bottom:20px;">
      <h3>Панель ведущего</h3>
      <input id="correctAnswer" placeholder="Правильный ответ">
      <input type="file" id="imageUpload" accept="image/*">
      <button onclick="startRound()">Начать раунд</button>
    </div>

    <div style="margin:20px 0;">
      <img id="photo" style="max-width:300px; display:none; border:1px solid #ccc;">
    </div>

    <hr>

    <input id="question" placeholder="Вопрос">
    <button onclick="sendQuestion()">Задать</button>

    <br><br>

    <button onclick="sendAnswer('Да')">Да</button>
    <button onclick="sendAnswer('Нет')">Нет</button>

    <hr>

    <input id="guess" placeholder="Ответ">
    <button onclick="sendGuess()">Угадать</button>

    <hr>

    <ul id="log"></ul>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
